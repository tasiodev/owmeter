name: OWMeter Scan
on:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OWMeter scan
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.OWMETER_API_KEY }}" \
            https://owmeter.app/api/projects/${{ secrets.OWMETER_PROJECT_ID }}/trigger-scan
