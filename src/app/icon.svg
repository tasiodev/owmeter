<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#111827"/>

  <!-- Gray base arc (full upper semicircle) -->
  <path d="M 4,22 A 12,12 0 0,1 28,22" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round"/>

  <!-- Green arc (last ~70° matching logo proportion) -->
  <path d="M 20.1,10.7 A 12,12 0 0,1 28,22" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>

  <!-- Score dots: red (low), blue (mid), green (high) -->
  <circle cx="4" cy="22" r="1.5" fill="#EF4444"/>
  <circle cx="16" cy="10" r="1.5" fill="#3B82F6"/>
  <circle cx="28" cy="22" r="1.5" fill="#10B981"/>

  <!-- Needle: 55° clockwise from up, pointing into green zone -->
  <line x1="16" y1="22" x2="24.2" y2="16.3" stroke="#F9FAFB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="16" cy="22" r="2.5" fill="#F9FAFB"/>
  <circle cx="16" cy="22" r="1" fill="#111827"/>
</svg>
