services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-owmeter}:${POSTGRES_PASSWORD:-owmeter}@db:5432/${POSTGRES_DB:-owmeter}
      REDIS_URL: redis://redis:6379
      ZAP_URL: http://zap:8050
      ZAP_API_KEY: ${ZAP_API_KEY:-changeme}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL}
      AUTH_TRUST_HOST: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      zap:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-owmeter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-owmeter}
      POSTGRES_DB: ${POSTGRES_DB:-owmeter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-owmeter}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    restart: unless-stopped
    command: zap.sh -daemon -host 0.0.0.0 -port 8050 -config api.key=${ZAP_API_KEY:-changeme} -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8050/JSON/core/view/version/?apikey=${ZAP_API_KEY:-changeme} || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
