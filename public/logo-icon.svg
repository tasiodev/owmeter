<svg xmlns="http://www.w3.org/2000/svg" viewBox="-180 -250 360 360" width="360" height="360">
  <rect x="-180" y="-250" width="360" height="360" rx="72" ry="72" fill="#0a0a0a"/>
  <!-- gauge track -->
  <path d="M -150,0 A 150,150 0 0,1 150,0" fill="none" stroke="#374151" stroke-width="24" stroke-linecap="round"/>
  <!-- green arc (high-score zone) -->
  <path d="M 50,-141.4 A 150,150 0 0,1 150,0" fill="none" stroke="#10B981" stroke-width="24" stroke-linecap="round"/>
  <!-- severity dots -->
  <circle cx="-150"    cy="0"       r="6" fill="#EF4444"/>
  <circle cx="-140.95" cy="-51.3"   r="6" fill="#EF4444"/>
  <circle cx="-114.9"  cy="-96.42"  r="6" fill="#F59E0B"/>
  <circle cx="-75"     cy="-129.9"  r="6" fill="#F59E0B"/>
  <circle cx="-26.05"  cy="-147.72" r="6" fill="#3B82F6"/>
  <circle cx="26.05"   cy="-147.72" r="6" fill="#3B82F6"/>
  <circle cx="75"      cy="-129.9"  r="6" fill="#10B981"/>
  <circle cx="114.9"   cy="-96.42"  r="6" fill="#10B981"/>
  <circle cx="140.95"  cy="-51.3"   r="6" fill="#10B981"/>
  <circle cx="150"     cy="0"       r="6" fill="#10B981"/>
  <!-- needle pointing to green zone -->
  <g transform="rotate(55)">
    <path d="M -8,0 L 0,-150 L 8,0 Z" fill="#F9FAFB"/>
    <circle cx="0" cy="0" r="16" fill="#F9FAFB"/>
    <circle cx="0" cy="0" r="6"  fill="#0a0a0a"/>
  </g>
</svg>
